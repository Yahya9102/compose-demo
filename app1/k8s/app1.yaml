apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: yahyasystementor/flask-app1:1.2
          ports:
            - containerPort: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: app1-service
spec:
  type: NodePort
  selector:
    app: app1  
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30081
